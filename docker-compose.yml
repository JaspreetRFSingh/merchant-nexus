version: '3.8'

# Docker Compose for Merchant Nexus
# Demonstrates: Container orchestration, microservices deployment, infrastructure as code

services:
  # MySQL for Merchant Service
  mysql-merchant:
    image: mysql:8.0
    container_name: merchant-nexus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: merchant_db
      MYSQL_USER: merchant_user
      MYSQL_PASSWORD: merchant_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_merchant_data:/var/lib/mysql
      - ./merchant-service/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # MySQL for Settlement Service
  mysql-settlement:
    image: mysql:8.0
    container_name: merchant-nexus-settlement-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: settlement_db
      MYSQL_USER: settlement_user
      MYSQL_PASSWORD: settlement_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_settlement_data:/var/lib/mysql
      - ./settlement-service/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # Elasticsearch for Catalog Service
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: merchant-nexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nexus-network

  # Redis for caching and distributed locking
  redis:
    image: redis:7-alpine
    container_name: merchant-nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # Kafka and Zookeeper for event-driven architecture
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: merchant-nexus-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - nexus-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: merchant-nexus-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "merchant-events:3:1,product-events:3:1,settlement-events:3:1"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nexus-network

  # Kafka UI for monitoring
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: merchant-nexus-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: nexus-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - nexus-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: merchant-nexus-api-gateway
    depends_on:
      - elasticsearch
      - redis
      - kafka
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - nexus-network

  # Merchant Service
  merchant-service:
    build:
      context: .
      dockerfile: merchant-service/Dockerfile
    container_name: merchant-nexus-service
    depends_on:
      mysql-merchant:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-merchant:3306/merchant_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - nexus-network

  # Catalog Service
  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: merchant-nexus-catalog-service
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - nexus-network

  # Settlement Service
  settlement-service:
    build:
      context: .
      dockerfile: settlement-service/Dockerfile
    container_name: merchant-nexus-settlement-service
    depends_on:
      mysql-settlement:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-settlement:3306/settlement_db?useSSL=false&serverTimezone=UTC
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - nexus-network

volumes:
  mysql_merchant_data:
  mysql_settlement_data:
  elasticsearch_data:
  redis_data:

networks:
  nexus-network:
    driver: bridge
